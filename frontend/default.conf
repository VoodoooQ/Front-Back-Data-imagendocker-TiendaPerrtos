server {
    listen 80;
    server_name _;
    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    # Archivos estáticos (tu SPA sencilla)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia backend. En Docker Compose resuelve por nombre de servicio.
    location /api/ {
        proxy_pass http://backend:3001;
        # En EC2 puedes reemplazar backend por IP privada o DNS interno del backend.
        # Ejemplo: proxy_pass http://10.0.2.24:3001;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
